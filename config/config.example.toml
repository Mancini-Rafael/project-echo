[openai]
model = "gpt-4o-transcribe"

[transcription]
vocabulary_prompt = """
TypeScript, Python, Postgres, Kubernetes, Docker, Rails, Django, Flask,
React, Next.js, Tailwind, npm, pnpm, uv, async, await, webhook, OAuth,
Vulcan, Tarifei, Comex Radar, Rafael Mancini
"""
language = "en"

[recording]
sample_rate = 16000
channels = 1

[hotkey]
# Modifier-only chord that toggles recording. All listed keys must be pressed
# simultaneously. Supported names (Mac-native): control, option, command, shift.
# Cross-platform aliases (ctrl, alt, cmd) are also accepted. You can also use
# any printable letter/digit, "space", "f1"-"f12". Modifier names match either
# side (e.g. "control" matches both ctrl_l and ctrl_r).
chord = ["control", "option", "command"]

[hotkey.sounds]
# Paths to sound files (.aiff/.wav). macOS system sounds live in
# /System/Library/Sounds/ (Pop, Tink, Glass, Funk, Bottle, Frog, Hero,
# Morse, Ping, Purr, Sosumi, Submarine). Set to "" to disable a cue.
start = "/System/Library/Sounds/Pop.aiff"
stop = "/System/Library/Sounds/Tink.aiff"
empty = "/System/Library/Sounds/Funk.aiff"
